<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Referencias Burgos | DME · DEE · DERESP</title>
<style>
:root{
  --azul:#1f5fa7;
  --azul2:#0f3f78;
  --amarillo:#ffe45c;
  --fondo:#f4f7fb;
  --card:#ffffff;
  --texto:#182033;
  --muted:#6b7280;
  --borde:#d7dfec;
  --ok:#17a34a;
  --warn:#f59e0b;
  --bad:#dc2626;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Tahoma,Arial,sans-serif;
  background:linear-gradient(135deg,#eef5ff,#fff9db);
  color:var(--texto);
}
.contenedor{
  max-width:1200px;
  margin:0 auto;
  padding:18px;
}
.hero{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:white;
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 12px 30px rgba(31,95,167,.25);
}
.hero h1{
  margin:0 0 8px 0;
  font-size:clamp(24px,4vw,40px);
  text-align:center;
}
.hero p{
  margin:0;
  text-align:center;
  opacity:.95;
  font-size:16px;
}
.panel{
  background:var(--card);
  margin-top:16px;
  border:1px solid var(--borde);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 24px rgba(15,63,120,.08);
}
.buscador{
  display:flex;
  gap:10px;
  align-items:center;
}
.buscador input{
  flex:1;
  border:2px solid var(--borde);
  border-radius:999px;
  padding:14px 18px;
  font-size:17px;
  outline:none;
}
.buscador input:focus{
  border-color:var(--azul);
}
button{
  border:0;
  border-radius:999px;
  padding:13px 18px;
  font-weight:700;
  cursor:pointer;
  background:var(--azul);
  color:white;
  font-size:15px;
}
button.sec{
  background:#e7eef8;
  color:var(--azul2);
}
button:hover{filter:brightness(.96)}
.estado{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}
.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-top:14px;
}
.kpi{
  background:#f8fbff;
  border:1px solid var(--borde);
  border-radius:14px;
  padding:12px;
  text-align:center;
}
.kpi b{
  display:block;
  font-size:22px;
  color:var(--azul2);
}
.kpi span{font-size:13px;color:var(--muted)}
.filtros{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}
.filtros label{
  background:#f8fbff;
  border:1px solid var(--borde);
  border-radius:999px;
  padding:8px 12px;
  font-size:14px;
  cursor:pointer;
}
.resultados{
  margin-top:16px;
  display:grid;
  gap:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--borde);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(15,63,120,.07);
}
.card-head{
  background:linear-gradient(90deg,var(--amarillo),#fff3a2);
  padding:14px 16px;
  border-bottom:1px solid var(--borde);
}
.card-head h2{
  margin:0;
  font-size:22px;
  color:#111827;
}
.sub{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
  font-weight:700;
  background:#e8f1ff;
  color:var(--azul2);
}
.badge.ok{background:#dcfce7;color:#166534}
.badge.warn{background:#fef3c7;color:#92400e}
.card-body{
  padding:14px 16px 16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.seccion{
  border:1px solid var(--borde);
  border-radius:14px;
  padding:12px;
  background:#fcfdff;
  min-width:0;
}
.seccion h3{
  margin:0 0 10px;
  font-size:17px;
  color:var(--azul2);
}
.lista{
  margin:0;
  padding:0;
  list-style:none;
  display:grid;
  gap:7px;
  max-height:330px;
  overflow:auto;
}
.lista li{
  border-bottom:1px dashed #dbe3ee;
  padding-bottom:7px;
  line-height:1.35;
}
.ref{
  font-weight:800;
  color:#111827;
}
.mini{
  color:var(--muted);
  font-size:13px;
}
.acciones{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}
.enlace{
  text-decoration:none;
  background:#e7eef8;
  color:var(--azul2);
  padding:9px 12px;
  border-radius:999px;
  font-weight:700;
  font-size:14px;
}
.aviso{
  border-left:5px solid var(--warn);
  background:#fff7ed;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}
.vacio{
  text-align:center;
  color:var(--muted);
  padding:30px;
}
.oculto{display:none!important}
@media(max-width:800px){
  .buscador{flex-direction:column;align-items:stretch}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .contenedor{padding:12px}
  .card-head h2{font-size:20px}
}
@media print{
  body{background:white}
  .hero,.panel.superior,.acciones,.filtros{display:none}
  .card{box-shadow:none;break-inside:avoid}
}
</style>
</head>
<body>
<div class="contenedor">
  <section class="hero">
    <h1>Buscador de Referencias Burgos</h1>
    <p>DME · DEE · DERESP — Planificador de activaciones URE Burgos</p>
  </section>

  <section class="panel superior">
    <div class="buscador">
      <input id="q" type="search" placeholder="Busca por DME, municipio, localidad, DEE o DERESP... Ej: 09405, Frías, Orbaneja, EBU-0001, RBU-001">
      <button onclick="buscar()">🔍 Buscar</button>
      <button class="sec" onclick="limpiar()">Borrar</button>
    </div>
    <div class="filtros">
      <label><input type="checkbox" id="soloTriple"> Solo DME + DEE + DERESP</label>
      <label><input type="checkbox" id="conDEE"> Con DEE</label>
      <label><input type="checkbox" id="conDERESP"> Con DERESP</label>
    </div>
    <div id="estado" class="estado">Cargando base de datos...</div>

    <div class="kpis" id="kpis">
      <div class="kpi"><b>-</b><span>Municipios</span></div>
      <div class="kpi"><b>-</b><span>Localidades</span></div>
      <div class="kpi"><b>-</b><span>DEE</span></div>
      <div class="kpi"><b>-</b><span>DERESP</span></div>
      <div class="kpi"><b>-</b><span>DERESP pendientes</span></div>
    </div>
  </section>

  <div id="resultados" class="resultados"></div>
</div>

<script>
/*
  CONFIGURACIÓN:
  - Si subes base_burgos.json al mismo sitio que este HTML, déjalo así.
  - Si lo subes a GitHub, cambia esta línea por la URL RAW:
    const BASE_JSON_URL = "https://raw.githubusercontent.com/USUARIO/REPO/main/base_burgos.json";
*/
const BASE_JSON_URL = "base_burgos.json";

let BD = null;
let indice = [];

function normalizar(txt){
  return String(txt || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toUpperCase()
    .replace(/[^A-Z0-9Ñ]+/g," ")
    .trim();
}

async function cargar(){
  try{
    const r = await fetch(BASE_JSON_URL + "?t=" + Date.now());
    if(!r.ok) throw new Error("No se pudo cargar " + BASE_JSON_URL);
    BD = await r.json();
    construirIndice();
    pintarKPIs();
    document.getElementById("estado").textContent =
      "Base cargada correctamente. Escribe un DME, municipio, localidad, DEE o DERESP.";
    document.getElementById("resultados").innerHTML =
      `<div class="panel vacio">Introduce una búsqueda para ver las referencias compatibles.</div>`;
  }catch(e){
    document.getElementById("estado").innerHTML =
      "⚠️ No se pudo cargar <b>base_burgos.json</b>. Sube el JSON junto al HTML o configura la URL RAW de GitHub.";
  }
}

function construirIndice(){
  indice = BD.municipios.map(m=>{
    const textos = [
      m.dme, m.municipio, m.provincia,
      ...(m.localidades || []).map(x=>x.localidad),
      ...(m.dee || []).flatMap(x=>[x.ref, x.nombre, x.municipio_origen]),
      ...(m.deresp || []).flatMap(x=>[x.ref, x.edificio, x.localidad, x.localidad_nomenclator])
    ];
    return {m, texto: normalizar(textos.join(" "))};
  });
}

function pintarKPIs(){
  const meta = BD.meta || {};
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><b>${meta.municipios || 0}</b><span>Municipios</span></div>
    <div class="kpi"><b>${meta.localidades || 0}</b><span>Localidades</span></div>
    <div class="kpi"><b>${meta.dee || 0}</b><span>DEE</span></div>
    <div class="kpi"><b>${meta.deresp || 0}</b><span>DERESP</span></div>
    <div class="kpi"><b>${meta.deresp_pendientes || 0}</b><span>DERESP pendientes</span></div>
  `;
}

function buscar(){
  if(!BD) return;
  const q = normalizar(document.getElementById("q").value);
  const soloTriple = document.getElementById("soloTriple").checked;
  const conDEE = document.getElementById("conDEE").checked;
  const conDERESP = document.getElementById("conDERESP").checked;

  let res = indice.filter(x=>{
    const m = x.m;
    if(q && !x.texto.includes(q)) return false;
    if(soloTriple && !((m.dee||[]).length && (m.deresp||[]).length)) return false;
    if(conDEE && !(m.dee||[]).length) return false;
    if(conDERESP && !(m.deresp||[]).length) return false;
    return true;
  });

  res = res.slice(0, 80).map(x=>x.m);
  pintarResultados(res, q);
}

function limpiar(){
  document.getElementById("q").value = "";
  document.getElementById("soloTriple").checked = false;
  document.getElementById("conDEE").checked = false;
  document.getElementById("conDERESP").checked = false;
  document.getElementById("resultados").innerHTML =
    `<div class="panel vacio">Introduce una búsqueda para ver las referencias compatibles.</div>`;
}

function activable(m){
  const tieneDEE = (m.dee || []).length > 0;
  const tieneDERESP = (m.deresp || []).length > 0;
  if(tieneDEE && tieneDERESP) return "DME + DEE + DERESP";
  if(tieneDEE) return "DME + DEE";
  if(tieneDERESP) return "DME + DERESP";
  return "DME";
}

function pintarResultados(lista, q){
  const cont = document.getElementById("resultados");
  if(!lista.length){
    cont.innerHTML = `<div class="panel vacio">No se han encontrado resultados.</div>`;
    return;
  }

  cont.innerHTML = lista.map(m => tarjeta(m)).join("");
}

function tarjeta(m){
  const locs = (m.localidades || []).slice(0, 80);
  const dee = (m.dee || []);
  const der = (m.deresp || []);
  const maps = "https://www.google.com/maps/search/" + encodeURIComponent((m.municipio || "") + " Burgos");

  return `
  <article class="card">
    <div class="card-head">
      <h2>${esc(m.municipio)} <span class="mini">(${esc(m.dme)})</span></h2>
      <div class="sub">
        <span class="badge ok">✅ ${activable(m)}</span>
        <span class="badge">📍 ${locs.length} localidades</span>
        <span class="badge">⛪ ${dee.length} DEE</span>
        <span class="badge">🏛 ${der.length} DERESP</span>
      </div>
    </div>
    <div class="card-body">
      <div class="grid">
        <section class="seccion">
          <h3>📍 Localidades / pedanías</h3>
          ${listaLocalidades(locs)}
        </section>
        <section class="seccion">
          <h3>⛪ DEE</h3>
          ${listaDEE(dee)}
        </section>
        <section class="seccion">
          <h3>🏛 DERESP</h3>
          ${listaDERESP(der)}
        </section>
      </div>
      <div class="acciones">
        <a class="enlace" target="_blank" rel="noopener" href="${maps}">📍 Abrir municipio en Google Maps</a>
        <a class="enlace" href="#" onclick="copiarFicha('${escAttr(m.dme)}');return false;">📋 Copiar ficha</a>
        <a class="enlace" href="#" onclick="window.print();return false;">🖨 Imprimir</a>
      </div>
    </div>
  </article>`;
}

function listaLocalidades(arr){
  if(!arr.length) return `<div class="mini">Sin localidades asociadas en la base.</div>`;
  return `<ul class="lista">${arr.map(x=>`
    <li><span class="ref">${esc(x.localidad)}</span>
    ${x.comarca ? `<br><span class="mini">Comarca: ${esc(x.comarca)}</span>` : ""}</li>
  `).join("")}</ul>`;
}

function listaDEE(arr){
  if(!arr.length) return `<div class="mini">Sin DEE asociado.</div>`;
  return `<ul class="lista">${arr.map(x=>`
    <li><span class="ref">${esc(x.ref)}</span> — ${esc(x.nombre)}
    ${x.municipio_origen ? `<br><span class="mini">Origen: ${esc(x.municipio_origen)}</span>` : ""}</li>
  `).join("")}</ul>`;
}

function listaDERESP(arr){
  if(!arr.length) return `<div class="mini">Sin DERESP asociado.</div>`;
  return `<ul class="lista">${arr.map(x=>`
    <li><span class="ref">${esc(x.ref)}</span> — ${esc(x.edificio)}
    ${x.localidad ? `<br><span class="mini">Localidad: ${esc(x.localidad)}</span>` : ""}
    ${x.estado ? `<br><span class="mini">Estado: ${esc(x.estado)}</span>` : ""}</li>
  `).join("")}</ul>`;
}

function copiarFicha(dme){
  const m = BD.municipios.find(x=>x.dme === dme);
  if(!m) return;
  const texto = [
    `${m.municipio} — DME ${m.dme}`,
    `Activable: ${activable(m)}`,
    "",
    "DEE:",
    ...(m.dee || []).map(x=>`- ${x.ref} ${x.nombre}`),
    "",
    "DERESP:",
    ...(m.deresp || []).map(x=>`- ${x.ref} ${x.edificio} (${x.localidad || ""})`)
  ].join("\n");
  navigator.clipboard.writeText(texto);
  alert("Ficha copiada al portapapeles");
}

function esc(s){
  return String(s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escAttr(s){ return esc(s).replace(/"/g,"&quot;"); }

document.getElementById("q").addEventListener("keydown", e=>{
  if(e.key === "Enter") buscar();
});
document.querySelectorAll(".filtros input").forEach(x=>x.addEventListener("change", buscar));
cargar();
</script>
</body>
</html>
