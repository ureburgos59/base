<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Referencias Burgos | URE Burgos</title>
<style>
:root{--azul:#1f5fa7;--azul2:#0f3f78;--amarillo:#ffe45c;--card:#fff;--texto:#182033;--muted:#64748b;--borde:#d7dfec}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#eef5ff,#fff9db);color:var(--texto)}
.wrap{max-width:1220px;margin:0 auto;padding:16px}.hero{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;border-radius:22px;padding:26px 18px;text-align:center;box-shadow:0 14px 34px rgba(31,95,167,.25)}
.hero h1{margin:0;font-size:clamp(26px,4vw,44px)}.hero p{margin:8px 0 0;opacity:.95}.panel{background:white;border:1px solid var(--borde);border-radius:20px;padding:16px;margin-top:14px;box-shadow:0 8px 24px rgba(15,63,120,.08)}
.search-row{display:grid;grid-template-columns:1fr auto auto;gap:10px}input[type=search]{width:100%;border:2px solid var(--borde);border-radius:999px;padding:15px 18px;font-size:17px;outline:none}input[type=search]:focus{border-color:var(--azul)}
button,.btn{border:0;border-radius:999px;padding:13px 18px;font-weight:800;cursor:pointer;background:var(--azul);color:white;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}button.secondary,.btn.secondary{background:#e7eef8;color:var(--azul2)}
.status{color:var(--muted);font-size:14px;margin-top:10px;text-align:center}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:14px}.kpi{background:#f8fbff;border:1px solid var(--borde);border-radius:16px;padding:13px 10px;text-align:center}.kpi b{display:block;color:var(--azul2);font-size:25px}.kpi span{color:var(--muted);font-size:13px}
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}.filters label{background:#f8fbff;border:1px solid var(--borde);border-radius:999px;padding:9px 13px;cursor:pointer;font-size:14px}
.results{margin-top:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:white;border:1px solid var(--borde);border-radius:20px;overflow:hidden;box-shadow:0 8px 22px rgba(15,63,120,.07)}.card-head{background:linear-gradient(90deg,var(--amarillo),#fff3a2);padding:14px 16px}.card-head h2{margin:0;font-size:22px}
.badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800;background:#e8f1ff;color:var(--azul2)}.badge.ok{background:#dcfce7;color:#166534}
.card-body{padding:14px 16px}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.box{background:#f8fbff;border:1px solid var(--borde);border-radius:14px;padding:10px;text-align:center}.box b{display:block;color:var(--azul2);font-size:22px}.box span{font-size:13px;color:var(--muted)}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.detail{margin-top:12px;display:none;border-top:1px solid var(--borde);padding-top:12px}.detail.open{display:block}.cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.section{border:1px solid var(--borde);background:#fcfdff;border-radius:14px;padding:10px}.section h3{margin:0 0 8px;color:var(--azul2);font-size:16px}
.list{list-style:none;margin:0;padding:0;display:grid;gap:6px;max-height:260px;overflow:auto}.list li{border-bottom:1px dashed #dbe3ee;padding-bottom:6px;line-height:1.35}.ref{font-weight:900;color:#111827}.mini{font-size:13px;color:var(--muted)}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:34px;background:white;border:1px solid var(--borde);border-radius:20px}.footer-note{color:var(--muted);text-align:center;font-size:13px;padding:20px 0 8px}
@media(max-width:900px){.results{grid-template-columns:1fr}.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.search-row{grid-template-columns:1fr}}@media print{.panel,.actions,.footer-note{display:none}body{background:white}.results{grid-template-columns:1fr}.card{break-inside:avoid;box-shadow:none}.detail{display:block!important}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero"><h1>Buscador de Referencias Burgos</h1><p>DME · DEE · DERESP · DVGE — Planificador de activaciones URE Burgos</p></header>
<section class="panel">
<div class="search-row"><input id="q" type="search" placeholder="Busca por DME, municipio, localidad, DEE, DERESP o DVGE... Ej: Orbaneja, 09405, RBU-001, VGBU-IZ"><button id="btnBuscar" type="button">🔍 Buscar</button><button id="btnBorrar" class="secondary" type="button">Borrar</button></div>
<div class="filters"><label><input type="checkbox" id="soloCuadruple"> Solo DME + DEE + DERESP + DVGE</label><label><input type="checkbox" id="conDEE"> Con DEE</label><label><input type="checkbox" id="conDERESP"> Con DERESP</label><label><input type="checkbox" id="conDVGE"> Con DVGE</label></div>
<div id="estado" class="status">Cargando base de datos...</div>
<div class="kpis" id="kpis"><div class="kpi"><b>-</b><span>Municipios</span></div><div class="kpi"><b>-</b><span>Localidades</span></div><div class="kpi"><b>-</b><span>DEE</span></div><div class="kpi"><b>-</b><span>DERESP</span></div><div class="kpi"><b>-</b><span>DVGE</span></div><div class="kpi"><b>-</b><span>DERESP pendientes</span></div></div>
</section>
<main id="resultados" class="results"></main>
<div class="footer-note">Base de datos URE Burgos · DME como diploma principal · DEE, DERESP y DVGE asociados por municipio/DME.</div>
</div>
<script>
const BASE_JSON_URL="https://raw.githubusercontent.com/ureburgos59/base/main/base_burgos.json";
let BD=null,indice=[];
function normalizar(txt){return String(txt||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().replace(/[^A-Z0-9Ñ]+/g," ").trim();}
async function cargar(){try{const r=await fetch(BASE_JSON_URL+"?t="+Date.now());if(!r.ok)throw new Error("No se pudo cargar la base");BD=await r.json();construirIndice();pintarKPIs();document.getElementById("estado").textContent="Base cargada correctamente. Escribe para buscar; no hace falta pulsar el botón.";pintarVacio("Escribe un DME, municipio, localidad, DEE o DERESP para empezar.");}catch(e){document.getElementById("estado").innerHTML="⚠️ No se pudo cargar la base. Revisa base_burgos.json en GitHub.";pintarVacio("Error cargando la base de datos.");}}
function construirIndice(){indice=(BD.municipios||[]).map(m=>{const textos=[m.dme,m.municipio,m.provincia,m.latitud,m.longitud,...(m.localidades||[]).map(x=>[x.localidad,x.comarca,x.estado].join(" ")),...(m.dee||[]).flatMap(x=>[x.ref,x.nombre,x.municipio_origen,x.estado]),...(m.deresp||[]).flatMap(x=>[x.ref,x.edificio,x.localidad,x.localidad_nomenclator,x.estado]),...(m.dvge||[]).flatMap(x=>[x.ref,x.nombre,x.estado])];return{m,texto:normalizar(textos.join(" "))};});}
function pintarKPIs(){const meta=BD.meta||{};document.getElementById("kpis").innerHTML=`<div class="kpi"><b>${meta.municipios||0}</b><span>Municipios</span></div><div class="kpi"><b>${meta.localidades||0}</b><span>Localidades</span></div><div class="kpi"><b>${meta.dee||0}</b><span>DEE</span></div><div class="kpi"><b>${meta.deresp||0}</b><span>DERESP</span></div><div class="kpi"><b>${meta.dvge||0}</b><span>DVGE</span></div><div class="kpi"><b>${meta.deresp_pendientes||0}</b><span>DERESP pendientes</span></div>`;}
function buscar(){if(!BD)return;const q=normalizar(document.getElementById("q").value);const soloCuadruple=document.getElementById("soloCuadruple").checked;const conDEE=document.getElementById("conDEE").checked;const conDERESP=document.getElementById("conDERESP").checked;const conDVGE=document.getElementById("conDVGE").checked;if(!q&&!soloCuadruple&&!conDEE&&!conDERESP&&!conDVGE){pintarVacio("Escribe una búsqueda o marca un filtro.");return;}let res=indice.filter(x=>{const m=x.m;if(q&&!x.texto.includes(q))return false;if(soloCuadruple&&!((m.dee||[]).length&&(m.deresp||[]).length&&(m.dvge||[]).length))return false;if(conDEE&&!(m.dee||[]).length)return false;if(conDERESP&&!(m.deresp||[]).length)return false;if(conDVGE&&!(m.dvge||[]).length)return false;return true;});pintarResultados(res.slice(0,80).map(x=>x.m));}
function limpiar(){document.getElementById("q").value="";document.getElementById("soloCuadruple").checked=false;document.getElementById("conDEE").checked=false;document.getElementById("conDERESP").checked=false;document.getElementById("conDVGE").checked=false;pintarVacio("Escribe un DME, municipio, localidad, DEE o DERESP para empezar.");}
function pintarVacio(txt){document.getElementById("resultados").innerHTML=`<div class="empty">${esc(txt)}</div>`;}
function activable(m){const partes=["DME"];if((m.dee||[]).length)partes.push("DEE");if((m.deresp||[]).length)partes.push("DERESP");if((m.dvge||[]).length)partes.push("DVGE");return partes.join(" + ");}
function pintarResultados(lista){if(!lista.length){pintarVacio("No se han encontrado resultados.");return;}document.getElementById("resultados").innerHTML=lista.map(tarjeta).join("");}
function tarjeta(m){const locs=m.localidades||[],dee=m.dee||[],der=m.deresp||[],dvge=m.dvge||[],id="det_"+String(m.dme).replace(/[^0-9A-Z]/g,"");const maps=(m.latitud&&m.longitud)?"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(m.latitud+","+m.longitud):"https://www.google.com/maps/search/"+encodeURIComponent((m.municipio||"")+" Burgos");return `<article class="card"><div class="card-head"><h2>${esc(m.municipio)} <span class="mini">DME ${esc(m.dme)}</span></h2><div class="badges"><span class="badge ok">✅ ${activable(m)}</span><span class="badge">📍 ${locs.length} localidades</span><span class="badge">⛪ ${dee.length} DEE</span><span class="badge">🏛 ${der.length} DERESP</span><span class="badge">📐 ${dvge.length} DVGE</span></div></div><div class="card-body"><div class="quick"><div class="box"><b>${esc(m.dme)}</b><span>DME</span></div><div class="box"><b>${dee.length}</b><span>DEE</span></div><div class="box"><b>${der.length}</b><span>DERESP</span></div><div class="box"><b>${dvge.length}</b><span>DVGE</span></div></div><div class="actions"><button type="button" onclick="toggleDetalle('${id}')">Ver detalle</button><a class="btn secondary" target="_blank" rel="noopener" href="${maps}">📍 Maps</a><button class="secondary" type="button" onclick="copiarFicha('${escAttr(m.dme)}')">📋 Copiar</button></div><div id="${id}" class="detail"><div class="cols"><section class="section"><h3>📍 Localidades</h3>${listaLocalidades(locs)}</section><section class="section"><h3>⛪ DEE</h3>${listaDEE(dee)}</section><section class="section"><h3>🏛 DERESP</h3>${listaDERESP(der)}</section><section class="section"><h3>📐 DVGE</h3>${listaDVGE(dvge)}</section></div></div></div></article>`;}
function toggleDetalle(id){const el=document.getElementById(id);if(el)el.classList.toggle("open");}
function listaLocalidades(arr){if(!arr.length)return`<div class="mini">Sin localidades asociadas.</div>`;return`<ul class="list">${arr.map(x=>`<li><span class="ref">${esc(x.localidad)}</span>${x.comarca?`<br><span class="mini">Comarca: ${esc(x.comarca)}</span>`:""}</li>`).join("")}</ul>`;}
function listaDEE(arr){if(!arr.length)return`<div class="mini">Sin DEE asociado.</div>`;return`<ul class="list">${arr.map(x=>`<li><span class="ref">${esc(x.ref)}</span> — ${esc(x.nombre)}${x.municipio_origen?`<br><span class="mini">${esc(x.municipio_origen)}</span>`:""}</li>`).join("")}</ul>`;}
function listaDERESP(arr){if(!arr.length)return`<div class="mini">Sin DERESP asociado.</div>`;return`<ul class="list">${arr.map(x=>`<li><span class="ref">${esc(x.ref)}</span> — ${esc(x.edificio)}${x.localidad?`<br><span class="mini">Localidad: ${esc(x.localidad)}</span>`:""}${x.estado?`<br><span class="mini">Estado: ${esc(x.estado)}</span>`:""}</li>`).join("")}</ul>`;}function listaDVGE(arr){if(!arr.length)return`<div class="mini">Sin DVGE asociado.</div>`;return`<ul class="list">${arr.map(x=>`<li><span class="ref">${esc(x.ref)}</span> — ${esc(x.nombre)}</li>`).join("")}</ul>`;}
function copiarFicha(dme){const m=(BD.municipios||[]).find(x=>x.dme===dme);if(!m)return;const texto=[`${m.municipio} — DME ${m.dme}`,`Activable: ${activable(m)}`,"","Localidades:",...(m.localidades||[]).map(x=>`- ${x.localidad}`),"","DEE:",...(m.dee||[]).map(x=>`- ${x.ref} ${x.nombre}`),"","DERESP:",...(m.deresp||[]).map(x=>`- ${x.ref} ${x.edificio} (${x.localidad||""})`),"","DVGE:",...(m.dvge||[]).map(x=>`- ${x.ref} ${x.nombre}`)].join("\n");navigator.clipboard.writeText(texto).then(()=>alert("Ficha copiada al portapapeles")).catch(()=>alert("No se pudo copiar automáticamente"));}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
function iniciar(){const q=document.getElementById("q");document.getElementById("btnBuscar").addEventListener("click",buscar);document.getElementById("btnBorrar").addEventListener("click",limpiar);q.addEventListener("input",()=>{clearTimeout(window.__t);window.__t=setTimeout(buscar,180);});q.addEventListener("keydown",e=>{if(e.key==="Enter")buscar();});document.querySelectorAll(".filters input").forEach(x=>x.addEventListener("change",buscar));cargar();}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",iniciar);}else{iniciar();}
</script>
</body>
</html>
